name: Health app E2E Tests

on:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install healthapp dependencies
        working-directory: ./healthapp
        run: npm install

      - name: Lint healthapp
        working-directory: ./healthapp
        run: npm run lint

      - name: Start healthapp server
        working-directory: ./healthapp
        run: |
          npm start &
          echo $! > server.pid
          sleep 3

      - name: Install test dependencies
        working-directory: ./healthapp-tests
        run: npm install

      # `--with-deps` Takes too long with github actions, using docker image instead
      - name: Install Playwright browsers
        uses: docker://mcr.microsoft.com/playwright:v1.44.0-jammy
        with:
          args: bash -c "cd /healthapp-tests && npx playwright test"

      - name: Run e2e tests
        working-directory: ./healthapp-tests
        run: npm test

      - name: Upload test report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: healthapp-tests/playwright-report/
          retention-days: 30

      - name: Stop healthapp server
        if: always()
        working-directory: ./healthapp
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
